name: CI

on:
  push:
    branches: [main]
    paths:
      - 'can-viewer/**'
      - 'sigma-diagnostics/**'
      - 'sigma-racer-mechanic/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'can-viewer/**'
      - 'sigma-diagnostics/**'
      - 'sigma-racer-mechanic/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - '.github/workflows/ci.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-diagnostics
    steps:
      - uses: actions/checkout@v7
        with:
          path: embedded/sigma-diagnostics

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-racer
          path: embedded/sigma-racer

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/vss-map
          path: embedded/vss-map

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-instrumentation
          path: embedded/sigma-instrumentation

      - uses: dtolnay/rust-toolchain@1.97.1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: embedded/sigma-diagnostics
          add-rust-environment-hash-key: false
          key: ${{ hashFiles('embedded/sigma-diagnostics/Cargo.lock', 'embedded/sigma-diagnostics/Cargo.toml', 'embedded/sigma-diagnostics/rust-toolchain.toml', 'embedded/sigma-diagnostics/.cargo/config.toml') }}

      - name: Install Slint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev

      - run: cargo test --workspace

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-diagnostics
    steps:
      - uses: actions/checkout@v7
        with:
          path: embedded/sigma-diagnostics

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-racer
          path: embedded/sigma-racer

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/vss-map
          path: embedded/vss-map

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-instrumentation
          path: embedded/sigma-instrumentation

      - uses: dtolnay/rust-toolchain@1.97.1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: embedded/sigma-diagnostics
          add-rust-environment-hash-key: false
          key: ${{ hashFiles('embedded/sigma-diagnostics/Cargo.lock', 'embedded/sigma-diagnostics/Cargo.toml', 'embedded/sigma-diagnostics/rust-toolchain.toml', 'embedded/sigma-diagnostics/.cargo/config.toml') }}

      - name: Install Slint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev

      - run: cargo test --workspace --lib --tests

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-diagnostics
    steps:
      - uses: actions/checkout@v7
        with:
          path: embedded/sigma-diagnostics

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-racer
          path: embedded/sigma-racer

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/vss-map
          path: embedded/vss-map

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-instrumentation
          path: embedded/sigma-instrumentation

      - uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: embedded/sigma-diagnostics
          add-rust-environment-hash-key: false
          key: ${{ hashFiles('embedded/sigma-diagnostics/Cargo.lock', 'embedded/sigma-diagnostics/Cargo.toml', 'embedded/sigma-diagnostics/rust-toolchain.toml', 'embedded/sigma-diagnostics/.cargo/config.toml') }}

      - name: Install Slint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev

      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-diagnostics
    steps:
      - uses: actions/checkout@v7
        with:
          path: embedded/sigma-diagnostics

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-racer
          path: embedded/sigma-racer

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/vss-map
          path: embedded/vss-map

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-instrumentation
          path: embedded/sigma-instrumentation

      - uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check

  release-build:
    name: Release build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-diagnostics
    steps:
      - uses: actions/checkout@v7
        with:
          path: embedded/sigma-diagnostics

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-racer
          path: embedded/sigma-racer

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/vss-map
          path: embedded/vss-map

      - uses: actions/checkout@v7
        with:
          repository: sigmatactical-org/sigma-instrumentation
          path: embedded/sigma-instrumentation

      - uses: dtolnay/rust-toolchain@1.97.1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: embedded/sigma-diagnostics
          add-rust-environment-hash-key: false
          key: ${{ hashFiles('embedded/sigma-diagnostics/Cargo.lock', 'embedded/sigma-diagnostics/Cargo.toml', 'embedded/sigma-diagnostics/rust-toolchain.toml', 'embedded/sigma-diagnostics/.cargo/config.toml') }}

      - name: Install Slint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev

      - run: cargo build -p can-viewer -p sigma-racer-mechanic --release
